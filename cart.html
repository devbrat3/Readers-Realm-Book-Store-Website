<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart | Readers Realm</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<header>
    <nav class="navbar container">

        <div class="logo">
            <img src="images/logo.png" alt="logo">
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>

    </nav>
</header>


<!-- ================= CART ================= -->

<div class="container cart-wrapper">

    <h1 class="page-title">Your Cart 🛒</h1>

    <div class="cart-layout">

        <!-- LEFT -->
        <div id="cart-items" class="cart-items"></div>

        <!-- RIGHT -->
        <div class="summary-box">

            <h3>Order Summary</h3>

            <div class="summary-line">
                <span>Items</span>
                <span id="item-count">0</span>
            </div>

            <div class="summary-line summary-total">
                <span>Total</span>
                <span id="total-price">₹0</span>
            </div>

            <!-- USER DETAILS -->
            <div class="user-form">
                <h4>Delivery Details</h4>

                <input placeholder="Full Name" id="name">
                <input placeholder="Address" id="address">
                <input placeholder="Phone Number" id="phone">
            </div>

            <button class="btn primary checkout-btn" id="checkoutBtn">
                Proceed to Checkout
            </button>

        </div>

    </div>

</div>


<!-- ================= SCRIPTS ================= -->

<script src="js/services/cartService.js"></script>
<script src="js/services/authService.js"></script>
<script src="js/services/orderService.js"></script>
<script src="js/main.js"></script>

<script>

/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded", () => {
    renderCart();
});


/* ================= DOM ================= */

const cartContainer = document.getElementById("cart-items");
const totalDisplay = document.getElementById("total-price");
const itemCount = document.getElementById("item-count");
const checkoutBtn = document.getElementById("checkoutBtn");


/* ================= RENDER ================= */

function renderCart() {

    const cart = CartService.getCart();

    cartContainer.innerHTML = "";

    if (!cart.length) {
        cartContainer.innerHTML = `
            <div class="empty">
                <h2>Your cart is empty 🛍️</h2>
                <p>Browse books and add your favorites</p>
            </div>
        `;
        totalDisplay.innerText = "₹0";
        itemCount.innerText = "0";
        return;
    }

    let total = 0;
    let count = 0;

    cart.forEach((item, index) => {

        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        count += item.quantity;

        cartContainer.innerHTML += `

            <div class="cart-item">

                <!-- IMAGE -->
                <div class="cart-img">
                    <img src="${item.img}" alt="${item.title}">
                </div>

                <!-- DETAILS -->
                <div class="cart-details">
                    <h3>${item.title}</h3>
                    <p class="cart-price">₹${item.price}</p>

                    <div class="cart-actions">
                        <button onclick="changeQty(${index}, -1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="changeQty(${index}, 1)">+</button>
                    </div>
                </div>

                <!-- PRICE -->
                <div class="cart-total">
                    ₹${itemTotal}
                </div>

                <!-- REMOVE -->
                <button class="remove-btn" onclick="removeItem(${index})">
                    ✕
                </button>

            </div>

        `;
    });

    totalDisplay.innerText = "₹" + total;
    itemCount.innerText = count;
}


/* ================= ACTIONS ================= */

function changeQty(index, delta) {
    CartService.updateQuantity(index, delta);
    renderCart();
}

function removeItem(index) {
    CartService.removeItem(index);
    renderCart();
}


/* ================= CHECKOUT ================= */

checkoutBtn.addEventListener("click", () => {

    const user = AuthService.getCurrentUser();

    if (!user) {
        App.showToast("Please login first 🔐", "warning");
        setTimeout(() => {
            window.location.href = "login.html";
        }, 1000);
        return;
    }

    const name = document.getElementById("name").value;
    const address = document.getElementById("address").value;
    const phone = document.getElementById("phone").value;

    if (!name || !address || !phone) {
        App.showToast("Fill all details ⚠️", "error");
        return;
    }

    localStorage.setItem("user", JSON.stringify({ name, address, phone }));

    window.location.href = "summary.html";

});

</script>

</body>
</html>
