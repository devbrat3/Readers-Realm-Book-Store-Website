<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Readers Realm</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        /* ================= LAYOUT ================= */
        .cart-wrapper {
            margin-top: 40px;
        }

        .cart-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        /* ================= CART ITEMS ================= */
        .cart-item {
            display: flex;
            gap: 15px;
            align-items: center;
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .cart-item:hover {
            transform: translateY(-3px);
        }

        .cart-item img {
            width: 80px;
            height: 110px;
            object-fit: cover;
            border-radius: 6px;
        }

        .cart-details {
            flex: 1;
        }

        .cart-price {
            color: #089da1;
            font-weight: bold;
        }

        .cart-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-actions button {
            padding: 5px 10px;
            border: none;
            background: #089da1;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .remove-btn {
            background: #ef4444;
        }

        /* ================= SUMMARY ================= */
        .summary-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            height: fit-content;
            position: sticky;
            top: 100px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .summary-line {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }

        .summary-total {
            font-size: 18px;
            font-weight: bold;
        }

        .checkout-btn {
            width: 100%;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .empty {
            text-align: center;
            margin-top: 40px;
            color: #64748b;
        }

        /* ================= MOBILE ================= */
        @media(max-width:768px){
            .cart-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<header>
    <nav class="navbar container">
        <div class="logo">
            <img src="images/logo.png">
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>
</header>

<div class="container cart-wrapper">

    <h1>Your Cart 🛒</h1>

    <div class="cart-layout">

        <!-- LEFT: ITEMS -->
        <div id="cart-items"></div>

        <!-- RIGHT: SUMMARY -->
        <div class="summary-box">

            <h3>Order Summary</h3>

            <div class="summary-line">
                <span>Items</span>
                <span id="item-count">0</span>
            </div>

            <div class="summary-line summary-total">
                <span>Total</span>
                <span id="total-price">₹0</span>
            </div>

            <!-- USER DETAILS -->
            <h4 style="margin-top:15px;">Details</h4>

            <input placeholder="Full Name" id="name">
            <input placeholder="Address" id="address">
            <input placeholder="Phone Number" id="phone">

            <button class="btn primary checkout-btn" onclick="goToSummary()">
                Proceed to Checkout
            </button>

        </div>

    </div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartContainer = document.getElementById("cart-items");
const totalDisplay = document.getElementById("total-price");
const itemCount = document.getElementById("item-count");

/* ================= RENDER ================= */
function renderCart() {

    cartContainer.innerHTML = "";

    if (cart.length === 0) {
        cartContainer.innerHTML = `<p class="empty">Your cart is empty 🛍️</p>`;
        totalDisplay.innerText = "₹0";
        itemCount.innerText = "0";
        return;
    }

    let total = 0;
    let count = 0;

    cart.forEach((item, index) => {

        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        count += item.quantity;

        cartContainer.innerHTML += `
            <div class="cart-item">

                <img src="${item.img}" alt="${item.title}">

                <div class="cart-details">
                    <h3>${item.title}</h3>
                    <p class="cart-price">₹${item.price}</p>
                </div>

                <div class="cart-actions">
                    <button onclick="changeQty(${index}, -1)">-</button>
                    ${item.quantity}
                    <button onclick="changeQty(${index}, 1)">+</button>
                </div>

                <div>₹${itemTotal}</div>

                <button class="remove-btn" onclick="removeItem(${index})">✕</button>

            </div>
        `;
    });

    totalDisplay.innerText = "₹" + total;
    itemCount.innerText = count;
}

/* ================= QUANTITY ================= */
function changeQty(index, delta) {
    cart[index].quantity += delta;

    if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

/* ================= REMOVE ================= */
function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

/* ================= CHECKOUT ================= */
function goToSummary() {

    const name = document.getElementById("name").value;
    const address = document.getElementById("address").value;
    const phone = document.getElementById("phone").value;

    if (!name || !address || !phone) {
        alert("Please fill all details");
        return;
    }

    localStorage.setItem("user", JSON.stringify({ name, address, phone }));

    window.location.href = "summary.html";
}

/* ================= INIT ================= */
renderCart();
</script>

</body>
</html>
