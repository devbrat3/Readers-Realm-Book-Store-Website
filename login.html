<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | Readers Realm</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #089da1, #0ea5e9);
        }

        .auth-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 380px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .auth-card h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .auth-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .password-box {
            position: relative;
        }

        .toggle-pass {
            position: absolute;
            right: 10px;
            top: 12px;
            cursor: pointer;
            color: #333;
        }

        .auth-card button {
            width: 100%;
            margin-top: 10px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 15px;
        }

        .auth-footer a {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h2>Welcome Back 👋</h2>

        <input id="email" placeholder="Email">

        <div class="password-box">
            <input id="password" type="password" placeholder="Password">
            <span class="toggle-pass" onclick="togglePassword()">👁</span>
        </div>

        <button class="btn primary" onclick="login()">Login</button>

        <div class="auth-footer">
            <p>Don't have an account? <a href="signup.html">Signup</a></p>
        </div>

    </div>

</div>

<script src="js/services/authService.js"></script>
<script src="js/main.js"></script>
<script src="js/pages/login.js"></script>

</body>
</html>
